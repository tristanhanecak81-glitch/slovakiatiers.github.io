<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlovakiaTiers - Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>SlovakiaTiers</h1>
        <p>Official Slovak Minecraft PvP Tier List</p>
        <div class="nav-buttons">
            <button class="nav-btn active">Leaderboard</button>
            <button class="nav-btn">Players</button>
            <button class="nav-btn">Tiers</button>
        </div>
    </div>

    <div class="container">
        <div class="leaderboard">
            <div class="leaderboard-header">
                <div class="rank">#</div>
                <div class="player">PLAYER</div>
                <div class="region">REGION</div>
                <div class="tiers">TIERS</div>
            </div>
            
            <div id="leaderboard-list"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
<link rel="stylesheet" href="Leaderboard/styles.css">
<script src="Leaderboard/data.js"></script>
<script src="Leaderboard/script.js"></script>
